<!DOCTYPE html><html><head><meta charset="utf-8"><title>Stack Tower</title><style>html,body{margin:0;height:100%;background:#0f1320}#game{height:100vh}#game #pp-block0,#game #pp-block1{display:none!important}#game #pp-block2{width:100%!important}</style></head><body><div id="game"></div><script src="https://cdn.jsdelivr.net/gh/pixelpad-io/pixelpad.min@main/pixelpad.min.js"></script><script>
PixelPad.game("#game", {"autoplay": true, "theme": "dark", "layout": "vertical", "canEdit": true, "textures": {"block.png": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAFoAAAAYCAYAAAB6OOplAAAATElEQVR4nO3QQQ3AIADAQHwhcWKRACoWknKP/psb65tb/zduD7wSaNCtQINuBRp0K9CgW4EG3Qo06FagQbcCDboVaNCtQINuBRp0qwPgX9ALvo59wAAAAABJRU5ErkJggg==", "slab.png": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAFoAAAAYCAYAAAB6OOplAAAASklEQVR4nO3QMQ0AIADAMPRhE6GggpCMHvuXjrn21v3G64FfAg26FWjQrUCDbgUadCvQoFuBBt0KNOhWoEG3Ag26FWjQrUCDbnUAfNOgOS2Cv2cAAAAASUVORK5CYII="}, "start": "self.score = 0\nself.lives = 3\nself.dead = False\nset_room('Play')", "loop": "if self.dead:\n    self.dead = False\n    set_room('GameOver')", "classes": {"Mover": {"start": "self.image = sprite('block.png')\nself.x = -250\nself.y = 200\nself.moveSpeed = 5", "loop": "self.x = self.x + self.moveSpeed\nself.scaleX = Game.blockW\nif self.x > 250:\n    self.moveSpeed = -5\nif self.x < -250:\n    self.moveSpeed = 5\nif mouse_was_pressed('left') or key_was_pressed(' '):\n    self.near = self.x - Game.lastX < 60 and self.x - Game.lastX > -60\n    if self.near:\n        self.s = Slab()\n        self.s.x = self.x\n        self.s.y = Game.pileY\nif mouse_was_pressed('left') or key_was_pressed(' '):\n    self.near2 = self.x - Game.lastX < 60 and self.x - Game.lastX > -60\n    if self.near2:\n        Game.lastX = self.x\n        Game.pileY = Game.pileY + 24\n        Game.score = Game.score + 1\nif mouse_was_pressed('left') or key_was_pressed(' '):\n    self.far = self.x - Game.lastX > 60 or self.x - Game.lastX < -60\n    if self.far:\n        Game.lives = Game.lives - 1\n        if Game.lives < 1:\n            Game.dead = True"}, "Slab": {"start": "self.image = sprite('slab.png')\nself.scaleX = Game.blockW\nGame.blockW = Game.blockW - 0.06", "loop": ""}}, "rooms": {"Play": {"start": "Game.lastX = 0\nGame.pileY = -200\nGame.blockW = 1.0\nGame.mover = Mover()\nGame.label = text()\nGame.label.color = \"white\"\nGame.label.y = 250\nGame.label.text = 'Score: 0'", "loop": "Game.label.text = 'Score: ' + str(Game.score) + '   Lives: ' + str(Game.lives)"}, "GameOver": {"start": "Game.t = text()\nGame.t.color = \"white\"\nGame.t.fontSize = 40\nGame.t.halign = \"center\"\nGame.t.text = 'GAME OVER - tap to play again'\nGame.s = text()\nGame.s.color = \"white\"\nGame.s.fontSize = 28\nGame.s.halign = \"center\"\nGame.s.y = -60\nGame.s.text = 'Final Score: ' + str(Game.score)", "loop": "if key_was_pressed(' ') or mouse_was_pressed('left'):\n    Game.score = 0\n    Game.lives = 3\n    set_room('Play')"}}});
(function(){var n=0;var iv=setInterval(function(){n++;window.dispatchEvent(new Event("resize"));var b=document.querySelector("#game #pp-start");if(!window.ppApp&&b&&b.textContent.trim()==="PLAY")b.click();if(window.ppApp||n>80){window.dispatchEvent(new Event("resize"));clearInterval(iv);}},200);})();</script></body></html>
