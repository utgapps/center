<!DOCTYPE html><html><head><script>window.UTG_GUARD="../";window.UTG_TOOL="camp";window.UTG_PLAY="pong";document.write('<script src="../class-codes.js?t='+Date.now()+'"><\/script>');</script><script src="../guard.js"></script><meta charset="utf-8"><title>Pong</title><style>html,body{margin:0;height:100%;background:#0f1320}#game{height:100vh}#game #pp-block0,#game #pp-block1{display:none!important}#game #pp-block2{width:100%!important}</style></head><body><div id="game"></div><script src="https://cdn.jsdelivr.net/gh/pixelpad-io/pixelpad.min@main/pixelpad.min.js"></script><script>
PixelPad.game("#game", {"autoplay": true, "theme": "dark", "layout": "vertical", "canEdit": true, "textures": {"paddle.png": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABIAAABkCAYAAACLtWCLAAAAMklEQVR4nO3MMQEAAAzDoPo3nZnYCQJYTyYSiUQikUgkEolEIpFIJBKJRCKRSCQSiUR1xR4FhYYBZMQAAAAASUVORK5CYII=", "ball.png": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABIAAAASCAYAAABWzo5XAAAAGUlEQVR4nGP4TyXAMGrQqEGjBo0aNNwMAgDZMQs8Mzy3wQAAAABJRU5ErkJggg=="}, "start": "self.you = 0\nself.cpu = 0\nself.dead = False\nself.restart = False\nset_room('Play')", "loop": "if self.dead:\n    self.dead = False\n    set_room('GameOver')", "classes": {"Paddle": {"start": "self.image = sprite('paddle.png')\nself.x = -340", "loop": "self.y = mouse_y()\nif self.y > 220:\n    self.y = 220\nif self.y < -220:\n    self.y = -220"}, "Cpu": {"start": "self.image = sprite('paddle.png')\nself.x = 340\nself.followSpeed = 5", "loop": "self.ball = Game.ball\nif self.y < self.ball.y - self.followSpeed:\n    self.y = self.y + self.followSpeed\nif self.y > self.ball.y + self.followSpeed:\n    self.y = self.y - self.followSpeed"}, "Ball": {"start": "self.image = sprite('ball.png')\nself.speedX = 5\nself.speedY = 3", "loop": "self.x = self.x + self.speedX\nself.y = self.y + self.speedY\nif self.y > 250 or self.y < -250:\n    self.speedY = -self.speedY\nif get_collision(self, 'Paddle'):\n    self.speedX = 5\nif get_collision(self, 'Cpu'):\n    self.speedX = -5\nif self.x < -380:\n    Game.cpu = Game.cpu + 1\n    self.x = 0\nif self.x > 380:\n    Game.you = Game.you + 1\n    self.x = 0"}}, "rooms": {"Play": {"start": "Game.paddle = Paddle()\nGame.ball = Ball()\nGame.cpuPaddle = Cpu()\nGame.label = text()\nGame.label.color = \"white\"\nGame.label.y = 230\nGame.label.text = '0 : 0'", "loop": "Game.label.text = str(Game.you) + ' : ' + str(Game.cpu)\nif Game.you > 4 or Game.cpu > 4:\n    Game.dead = True"}, "GameOver": {"start": "Game.t = text()\nGame.t.color = \"white\"\nGame.t.fontSize = 40\nGame.t.halign = \"center\"\nGame.t.text = 'GAME OVER - tap to play again'\nGame.s = text()\nGame.s.color = \"white\"\nGame.s.fontSize = 28\nGame.s.halign = \"center\"\nGame.s.y = -60\nGame.s.text = 'You ' + str(Game.you) + '   Cpu ' + str(Game.cpu)", "loop": "if key_was_pressed(' ') or mouse_was_pressed('left'):\n    Game.you = 0\n    Game.cpu = 0\n    set_room('Play')"}}});
(function(){var n=0;var iv=setInterval(function(){n++;window.dispatchEvent(new Event("resize"));var b=document.querySelector("#game #pp-start");if(!window.ppApp&&b&&b.textContent.trim()==="PLAY")b.click();if(window.ppApp||n>80){window.dispatchEvent(new Event("resize"));clearInterval(iv);}},200);})();</script></body></html>
